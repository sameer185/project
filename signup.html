<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelGo | Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="common.css">
<style>
body{display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 60% at 25% 40%,rgba(8,145,178,0.06) 0%,transparent 65%);
  pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,#c7d2e8 1px,transparent 1px);
  background-size:30px 30px;opacity:0.35;pointer-events:none;z-index:0;}
nav{position:relative;z-index:10;background:rgba(255,255,255,0.88);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;position:relative;z-index:1;}

.su-field{margin-bottom:14px;}
.su-label{display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px;}
.su-field input{width:100%;padding:13px 16px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;}
.su-field input::placeholder{color:var(--muted);}

.strength-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-top:8px;}
.strength-fill{height:100%;width:0;transition:width 0.35s ease,background 0.35s ease;border-radius:2px;}
.strength-label{font-size:11px;font-weight:600;color:var(--muted);margin-top:5px;}

.terms{font-size:12px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.6;}
.terms a{color:var(--accent);text-decoration:none;font-weight:600;}

.nav-login{border:1.5px solid var(--border)!important;color:var(--text2)!important;}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">TravelGo</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="flight.html">Flights</a>
    <a href="train.html">Trains</a>
    <a href="hotel.html">Hotels</a>
    <a href="movie.html">Movies</a>
    <a href="login.html" class="nav-login">Login</a>
  </div>
</nav>

<main>
  <div class="auth-card scale-in">
    <div class="auth-header">
      <div class="auth-icon">🚀</div>
      <h2>Create account</h2>
      <p>Join thousands of travellers on TravelGo</p>
    </div>
    <div class="error-msg" id="errMsg"></div>
    <div class="su-field"><label class="su-label">Full Name</label><input type="text" id="sName" placeholder="e.g. Sameer Khan"></div>
    <div class="su-field"><label class="su-label">Email Address</label><input type="email" id="sEmail" placeholder="you@example.com"></div>
    <div class="su-field">
      <label class="su-label">Password</label>
      <input type="password" id="sPass" placeholder="Min. 6 characters" oninput="checkStrength(this.value)">
      <div class="strength-bar"><div class="strength-fill" id="sFill"></div></div>
      <div class="strength-label" id="sLabel"></div>
    </div>
    <div class="su-field"><label class="su-label">Confirm Password</label><input type="password" id="sConfirm" placeholder="Re-enter password"></div>
    <button class="auth-btn" onclick="signup()">Create My Account →</button>
    <p class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
    <div class="auth-footer" style="margin-top:16px;">Already have an account? <a href="login.html">Login here</a></div>
  </div>
</main>

<script>
const LEVELS=[{color:'#ef4444',label:'Weak'},{color:'#f59e0b',label:'Fair'},{color:'#3b82f6',label:'Good'},{color:'#10b981',label:'Strong'}];
function checkStrength(v){
  let s=0;
  if(v.length>=6)s++;if(v.length>=10)s++;if(/[A-Z]/.test(v))s++;if(/[0-9!@#$%]/.test(v))s++;
  const lv=s>0?LEVELS[Math.min(s-1,3)]:null;
  const fill=document.getElementById('sFill'), label=document.getElementById('sLabel');
  fill.style.width=(s/4*100)+'%';fill.style.background=lv?lv.color:'#ef4444';
  label.textContent=lv?lv.label:'';label.style.color=lv?lv.color:'';
}
function signup(){
  const name=document.getElementById('sName').value.trim();
  const email=document.getElementById('sEmail').value.trim();
  const pass=document.getElementById('sPass').value;
  const confirm=document.getElementById('sConfirm').value;
  const err=document.getElementById('errMsg');
  err.style.display='none';
  if(!name||!email||!pass||!confirm){err.textContent='Please fill in all fields.';err.style.display='block';return;}
  if(pass.length<6){err.textContent='Password must be at least 6 characters.';err.style.display='block';return;}
  if(pass!==confirm){err.textContent='Passwords do not match.';err.style.display='block';return;}
  localStorage.setItem('tg_user',JSON.stringify({name,email}));
  if(window.tgToast) window.tgToast('Account created! Welcome, '+name+'! 🎉','🚀',3500);
  setTimeout(()=>window.location.href='login.html', 800);
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')signup();});
</script>
<script src="navbar.js"></script>
<script src="animations.js"></script>
</body>
</html>

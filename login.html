<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelGo | Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="animations.css">
<link rel="stylesheet" href="common.css">
<style>
body{display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 60% at 80% 40%,rgba(29,78,216,0.06) 0%,transparent 65%),
    radial-gradient(ellipse 40% 40% at 15% 70%,rgba(8,145,178,0.05) 0%,transparent 65%);
  pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,#c7d2e8 1px,transparent 1px);
  background-size:30px 30px;opacity:0.35;pointer-events:none;z-index:0;}
nav{position:relative;z-index:10;background:rgba(255,255,255,0.88);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;position:relative;z-index:1;}

.field{margin-bottom:16px;}
.field input{width:100%;padding:13px 16px;background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;}
.field input::placeholder{color:var(--muted);}
.forgot{text-align:right;margin-top:6px;}
.forgot a{color:var(--accent);font-size:12.5px;font-weight:600;text-decoration:none;}
.forgot a:hover{text-decoration:underline;}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">TravelGo</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="flight.html">Flights</a>
    <a href="train.html">Trains</a>
    <a href="hotel.html">Hotels</a>
    <a href="movie.html">Movies</a>
    <a href="signup.html" class="nav-cta">Sign Up Free</a>
  </div>
</nav>

<main>
  <div class="auth-card scale-in">
    <div class="auth-header">
      <div class="auth-icon">👋</div>
      <h2>Welcome back</h2>
      <p>Sign in to access your bookings</p>
    </div>
    <div class="error-msg" id="errMsg">Invalid email or password.</div>
    <div class="field">
      <label style="display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px;">Email Address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com">
    </div>
    <div class="field">
      <label style="display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.8px;text-transform:uppercase;margin-bottom:8px;">Password</label>
      <input type="password" id="loginPass" placeholder="Enter your password">
      <div class="forgot"><a href="#">Forgot password?</a></div>
    </div>
    <button class="auth-btn" onclick="login()">Login to TravelGo →</button>
    <div class="divider">or</div>
    <div class="auth-footer">Don't have an account? <a href="signup.html">Sign up — it's free</a></div>
  </div>
</main>

<script>
function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('errMsg');
  if (!email || !pass) { err.textContent='Please fill in all fields.'; err.style.display='block'; return; }
  const stored = localStorage.getItem('tg_user');
  if (stored) {
    const user = JSON.parse(stored);
    if (user.email === email) {
      localStorage.setItem('tg_loggedIn', email);
      if(window.tgToast) window.tgToast('Welcome back, ' + user.name + '! 👋','✅',2500);
      setTimeout(()=>window.location.href='index.html', 700);
      return;
    }
  }
  err.textContent='Invalid email or password.'; err.style.display='block';
}
document.addEventListener('keydown', e => { if (e.key==='Enter') login(); });
</script>
<script src="navbar.js"></script>
<script src="animations.js"></script>
</body>
</html>
